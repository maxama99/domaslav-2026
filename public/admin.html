<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Hospodská olympiáda</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍺</text></svg>" />
  <script>document.documentElement.dataset.theme = localStorage.getItem('theme') || 'dark';</script>
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Přepnout motiv"></button>
  <header class="hero" style="padding-bottom:0.5rem">
    <h1 style="font-size:1.8rem">⚙️ Admin</h1>
    <p class="subtitle"><a href="/">← zpět na žebříček</a></p>
  </header>

  <main class="admin-wrap">
    <!-- Přihlášení -->
    <div class="card" id="login-card">
      <h2>Přihlášení</h2>
      <div class="row">
        <div style="flex:1">
          <label for="password">Heslo</label>
          <input type="password" id="password" placeholder="admin heslo" />
        </div>
        <button id="login-btn">Přihlásit</button>
      </div>
      <p id="login-error" class="hint hidden" style="color:#e88">Špatné heslo.</p>
    </div>

    <div id="panel" class="hidden">
      <!-- Nastavení akce -->
      <div class="card">
        <h2>Nastavení akce</h2>
        <label for="event_title">Název akce</label>
        <input type="text" id="event_title" />
        <div style="height:0.8rem"></div>
        <label>Názvy disciplín pětiboje</label>
        <div class="grid" id="disciplines-grid"></div>
        <div style="height:0.8rem"></div>
        <label for="tiebreak_correct">Správná odpověď rozstřelové otázky (číslo)</label>
        <input type="number" step="any" id="tiebreak_correct" style="width:12rem" />
        <div style="height:0.9rem"></div>
        <button id="save-settings">Uložit nastavení</button>
      </div>

      <!-- Přidat tým -->
      <div class="card">
        <h2>Přidat tým</h2>
        <div class="row">
          <div style="flex:1;min-width:12rem">
            <label for="new-team">Název týmu</label>
            <input type="text" id="new-team" placeholder="např. Zlaté ledvinky" />
          </div>
          <div style="flex:1;min-width:12rem">
            <label for="new-secret">Tajné slovo (pro vstup týmu)</label>
            <input type="text" id="new-secret" placeholder="např. zlata-slepice" />
          </div>
          <button id="add-team">Přidat</button>
        </div>
        <p class="hint" style="text-align:left;margin-bottom:0">
          Tým se tímto slovem přihlásí na <a href="/tym">/tym</a> a vylosují se mu 2 tajné mise.
        </p>
      </div>

      <!-- Týmy a body -->
      <div class="card">
        <h2>Týmy a body</h2>
        <div id="teams"></div>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>
  <script src="/admin.js"></script>
  <script src="/theme.js"></script>
</body>
</html>
